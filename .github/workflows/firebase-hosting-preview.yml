name: Preview Web App on Firebase Hosting

on:
  pull_request:
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/firebase-hosting-preview.yml'
      - '!web/README.md'
      - '!web/AGENTS.md'

jobs:
  quality_and_preview:
    permissions:
      contents: 'read'
      id-token: 'write'
      pull-requests: write
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit -- --run

      - name: Build production bundle
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run App Hosting integration tests (prod-like, emulators)
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
        run: firebase emulators:exec --config firebase.ci.json --project learning-assistant-poc --only apphosting,auth,firestore "npm run test:integ -- --reporter=line"

      - name: Authenticate to Google Cloud
        if: github.event_name == 'pull_request'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting preview channel
        if: github.event_name == 'pull_request'
        id: deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FIREBASE_CLI_EXPERIMENTS: webframeworks
        run: |
          CHANNEL_ID="pr-${{ github.event.pull_request.number }}"
          OUTPUT=$(firebase hosting:channel:deploy $CHANNEL_ID --project=${{ secrets.GCP_PROJECT_ID }} --expires=1h --json 2>&1)
          echo "deploy_output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Add or update preview URL in PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          DEPLOY_OUTPUT: ${{ steps.deploy.outputs.deploy_output }}
        with:
          script: |
            const script = require('./.github/scripts/comment-preview-url.js');
            await script({ github, context, core });
