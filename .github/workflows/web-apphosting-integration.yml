name: Web Integration (App Hosting Emulator)

on:
  pull_request:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/web-apphosting-integration.yml"
      - "!web/README.md"
      - "!web/AGENTS.md"
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/web-apphosting-integration.yml"
      - "!web/README.md"
      - "!web/AGENTS.md"

jobs:
  apphosting_integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run App Hosting integration test (Firebase emulators)
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
        run: firebase emulators:exec --project learning-assistant-poc --only apphosting,auth,firestore "npm run test:integ -- --reporter=line"
